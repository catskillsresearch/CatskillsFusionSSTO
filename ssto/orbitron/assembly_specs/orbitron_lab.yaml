schema_version: 2
assembly:
  id: orbitron_lab
  title: 'Orbitron fusion arcjet laboratory (single SSOT: geometry + logical tree)'
  narrative: |
    Single YAML SSOT: CadQuery ``instances`` plus ``logical.groups``; ``cq.Assembly``
    export mirrors the logical tree (no second nest pass).

    **Test stand intent:** Ground integration article for a compact **p-¹¹B** crossed-field
    fusion machine (Orbitron-class narrative), staged so plumbing, thermal paths, and
    operator-visible services stay **pad-credible**. FlightGear export is a **discipline
    step**—forcing named parts and interfaces—**not** the end product.

    **Energy offload (design basis):** Multi-MV direct grid tie was rejected for plant
    footprint at scale; the article **vents fusion-derived energy by doing thermodynamic
    work on a gas path** (air-breathing train + CD nozzle), which makes **wall heat removal
    and cryogen loops first-class** (liquid **CH₄** anode / plant thermal management).

    **Steady operation:** After start-up, the stand is intended to run **continuous steady
    state** while **consumables** (injectants, cryogen, parasitic power budgets) last,
    with orderly shutdown before starvation—not intrinsic drift to failure.

    **Headline fusion channel (post-dissociation in plasma):** ``¹H + ¹¹B → 3 ⁴He``;
    **B₂H₆** is the engineered **gaseous boron carrier** to the injector/NBI path; **H₂**
    is the **NBI co-injectant** (stability / proton inventory); **CH₄** (liquid) is
    primarily **thermal management**, not the boron carrier.

    **``fusion_arcjet_engine`` (glTF / scene root):** FlightGear and Blender see this
    name as the **nested export root** wrapping ``test_stand``. **Scale-up architecture
    (flight article):** on the order of **~1000** niobium **anode discharge channels**
    (boron inventory per cell after dissociation narrative) packed in a **hex-close** or
    similar **cluster**, all **inside one common solenoid / magnet bore**—one magnetic
    volume, many parallel pressure boundaries. **This lab mesh** is the **1×1 surrogate**:
    **one ``Magnet``**, **one ``Anode``**, same logical air path and services discipline
    as the multi-cell article, without modeling the full bundle.
logical:
  root: test_stand
  scene_root_name: fusion_arcjet_engine
  glossary:
  - term: Annulus
    definition: 'A ring-shaped passage: fluid moves in the gap between two concentric
      surfaces (for example between an outer duct wall and an inner core or plug).
      It is used to route bypass air, condition shocks, or feed gas around a central
      module before it rejoins a core or nozzle.'
  - term: Blast / shock detuner
    definition: A short fluidic insert or multi-port cavity whose job is to tame abrupt
      pressure spikes (blasts or strong shocks) so upstream hardware sees gentler
      gradients. This lab mesh splits the coarse module into an annulus sleeve, a
      central insert, and a bolting / seal flange at the nozzle interface.
  - term: CD (convergent–divergent) nozzle
    definition: A supersonic nozzle with a converging section, a minimum-area throat,
      and a diverging section. The lab exports three coarse solids (inlet plenum adapter,
      throat-forward CD segment, divergent exit) that tile axially behind the reactor
      outlet ring.
  - term: p-¹¹B headline channel
    definition: 'After gas dissociation / ionization in the discharge, the primary
      aneutronic-marketing channel is proton + boron-11 → three alpha particles (⁴He),
      written ``¹H + ¹¹B → 3 ⁴He``; diborane is the chemical carrier that brings boron
      to the injector train, not a literal two-atom fusion reagent molecule.'
  - term: NBI injectant mix
    definition: Tangential neutral-beam / gas-injection path that co-feeds hydrogen
      and diborane (design narrative uses a high H₂ to B₂H₆ ratio) to stabilize the
      discharge (e.g. Diocotron / laminarity language) and supply hydrogenic species
      including the proton component of p-¹¹B.
  - term: Helium ash (fusion product)
    definition: 'Alpha particles (⁴He) from the headline channel ``¹H + ¹¹B → 3 ⁴He``.
      In this lab mesh they **vent from the core exhaust plane** through ``Helium_Ash_Vent_Line``
      into the **CD nozzle plenum** (not from the H₂ supply tank). Distinct from **gaseous
      hydrogen** stored in ``Tank_Hydrogen`` / ``hydrogen_tank_assy``.'
  - term: Liquid methane thermal loop
    definition: Cryogenic liquid CH₄ used as a working fluid for **anode / boundary
      Bremsstrahlung heat removal** and related plant cryogenics in this concept; it
      is **not** the boron carrier. In the lab glTF, routing is through ``Cryo_Methane_Piping``
      under ``methane_tank_assy`` (the redundant CH₄ leg on the old combined injectant trunk was removed).
  - term: Engine mount frame
    definition: '``Engine_Mount_Frame`` on ``thrust_sled`` — four posts on the load-cell tops
      and a shared plate (`engine_mount_frame` in ``arcjet_test_stand_cad.py``). The
      air-breathing engine pivot (`ENGINE_MOUNT_TOP_Z`) sits on that plate so the mesh
      shows a continuous load path: cells → posts → plate → engine.'
  - term: Thrust-sled load telemetry
    definition: 'Four corner **load-cell pucks** on ``thrust_sled`` (`LoadCell_0`…`3`) represent
      pad bookkeeping, not strain-gauge FEA. **Thrust** and **airflow (mdot)** come from the JSBSim
      bilinear surrogate (``/controls/reactor/throttle``, ``/controls/orbitron/compressor``).
      Corner **lbf** values and **sled-load-total** are computed in ``orbitron-jsbsim.xml`` from
      coeffs in ``orbitron_physics_surrogate.yaml`` (`thrust_sled_load_cells`) and shown on the
      operator **Screen** via ``orbitron_nasal.yaml``. See ``assembly_specs/README.md``.'
  connections:
  - from: Tank_Hydrogen
    to: Pipe_H2_Feed
    label: tank fitting / flex jumper
    kind: dotted
  - from: Tank_Cryo_Methane
    to: Pipe_CH4_Feed
    label: CH4 service from cryo methane tank
    kind: dotted
  - from: Tank_Diborane
    to: Pipe_B2H6_Feed
    label: B2H6 line — gaseous boron carrier to NBI / injector manifold
    kind: dotted
  - from: Pipe_H2_Feed
    to: Hydrogen_Trunk_Line
    label: H2 injectant trunk toward magnet / NBI manifold
    kind: dotted
  - from: Fusion_Hot_Gas_Outlet
    to: Helium_Ash_Vent_Line
    label: fusion ⁴He ash bleed from core exhaust plane
    kind: dotted
  - from: Helium_Ash_Vent_Line
    to: Nozzle_Inlet_Plenum
    label: helium ash vents into nozzle plenum / jet mix
    kind: solid
  - from: Pipe_B2H6_Feed
    to: Boron_Trunk_Line
    label: B2H6 injectant trunk toward magnet / NBI manifold
    kind: dotted
  - from: Pipe_H2_Feed
    to: DEC_Grid
    label: H2 toward grid / plenum region (schematic)
    kind: dotted
  - from: Pipe_CH4_Feed
    to: DEC_Grid
    label: Optional schematic CH4 / plenum tie (not primary anode jacket detail)
    kind: dotted
  - from: Pipe_B2H6_Feed
    to: DEC_Grid
    label: B2H6 / boron inventory toward grid region (schematic)
    kind: dotted
  - from: Cryo_Methane_Piping
    to: Tank_Cryo_Methane
    label: cryostat / fill circuit (schematic)
    kind: dotted
  - from: Cryo_Methane_Piping
    to: Compressor_Can
    label: intercooling / heat rejection tie (concept)
    kind: dotted
  - from: High_Voltage_Umbilical
    to: Cathode
    label: HV feed toward cathode stack (schematic)
    kind: dotted
  - from: Bellmouth_Inlet
    to: Compressor_Can
    label: inlet → compressor
    kind: solid
  - from: Compressor_Can
    to: Reactor_Bay_Inlet_Shroud
    label: compressor discharge into reactor bay annulus jacket (outer shell)
    kind: solid
  - from: Reactor_Bay_Inlet_Shroud
    to: Magnet
    label: jacket bridges gap to solenoid shell; bore clears niobium / plasma boundary
    kind: solid
  - from: Reactor_Bay_Inlet_Shroud
    to: BD_Annulus_Sleeve
    label: same annulus / bypass circuit continues downstream toward detuner
    kind: dotted
  - from: BD_Annulus_Sleeve
    to: BD_Shock_Detuner_Core
    label: annulus gas into detuner throat
    kind: solid
  - from: BD_Shock_Detuner_Core
    to: BD_Bracket_Seals
    label: pressure loads & seals
    kind: solid
  - from: BD_Annulus_Sleeve
    to: DEC_Grid
    label: conditioned flow couples core periphery
    kind: dotted
  - from: BD_Shock_Detuner_Core
    to: Magnet
    label: shock management near magnetic volume (concept)
    kind: dotted
  - from: Fusion_Hot_Gas_Outlet
    to: Nozzle_Inlet_Plenum
    label: core exhaust plane → nozzle inlet
    kind: solid
  - from: DEC_Grid
    to: Fusion_Hot_Gas_Outlet
    label: grid plenum toward outlet (schematic)
    kind: dotted
  - from: Nozzle_Inlet_Plenum
    to: Nozzle_CD_Contour
    label: inlet conditioning → CD contour
    kind: solid
  - from: Nozzle_CD_Contour
    to: Nozzle_Exit_Hardware
    label: contour → exit struts / flange
    kind: solid
  - from: Nozzle_Inlet_Plenum
    to: Fusion_Hot_Gas_Outlet
    label: axis / interface alignment
    kind: dotted
  - from: BD_Bracket_Seals
    to: Nozzle_Inlet_Plenum
    label: detuner flange mates nozzle plenum
    kind: dotted
  groups:
    test_stand:
      title: Orbitron test stand
      detail: 'Pad-credible ground article: fusion core in an air-breathing flowpath
        with segmented nozzle, fuel farm (H₂, B₂H₆, liquid CH₄), HV and cryostat services,
        and operator station. Intended for continuous steady operation while consumables
        last; FlightGear is a visualization / integration discipline, not the end product.'
      members:
      - control_panel_stand
      - thrust_sled
      - tank_assy
      - fluid_and_electrical_services
      - air_breathing_engine
    control_panel_stand:
      title: Control panel and operator station
      detail: Desk, screen, emergency stop, and HV umbilical breakout toward the reactor
        (rails and thrust deck are a separate ``thrust_sled`` assembly). The **Screen** mesh
        shows live thrust, airflow (surrogate mdot), and **four thrust-sled load cells** from
        JSBSim (``orbitron_nasal.yaml`` → ``reactor_ui``; physics in ``orbitron_physics_surrogate.yaml``).
      members:
      - hv_umbilical
      parts:
      - Big_Red_Button
      - Operator_Console
      - Screen
    thrust_sled:
      title: Thrust sled
      detail: Longitudinal rails, deck slab, **four corner load cells**, and an **engine
        mount frame** (posts on the cells + top plate). The air-breathing engine stack
        is posed with its inlet pivot on that plate (``ENGINE_MOUNT_TOP_Z`` in
        ``arcjet_test_stand_cad.py``). Simulated thrust / corner lbf — ``assembly_specs/README.md``.
      parts:
      - Rail_Left
      - Rail_Right
      - Thrust_Sled_Frame
      - LoadCell_0
      - LoadCell_1
      - LoadCell_2
      - LoadCell_3
      - Engine_Mount_Frame
    tank_assy:
      title: Tank farm assemblies
      detail: One logical cluster per species; each child assembly carries **tank +
        decal + tank-end valve boss + routed trunk** so sub-glTF exports read as coherent
        packages. A shared **skid deck** (``Tank_Farm_Platform``) spans the three cylinder
        footprints so the farm reads as pad-mounted hardware.
      parts:
      - Tank_Farm_Platform
      members:
      - methane_tank_assy
      - boron_tank_assy
      - hydrogen_tank_assy
    methane_tank_assy:
      title: Methane tank assembly (cryo service)
      detail: Liquid **CH₄** dewar, stencil, dewar-roof valve boss, and **cryostat leg**
        to the magnet rim tap. The old black **CH₄ leg** on the combined ``Fuel_Gas_Lines``
        trunk duplicated this thermal story; it was **removed**—only this assembly + ``Cryo_Methane_Piping``
        carry CH₄ routing in coarse CAD.
      parts:
      - Tank_Cryo_Methane
      - Decal_CH4
      - Pipe_CH4_Feed
      - Cryo_Methane_Piping
    boron_tank_assy:
      title: Boron (B₂H₆) tank assembly
      detail: Diborane cylinder, stencil, tank-roof valve boss, and **dedicated** B₂H₆ injectant trunk.
      parts:
      - Tank_Diborane
      - Decal_B2H6
      - Pipe_B2H6_Feed
      - Boron_Trunk_Line
    hydrogen_tank_assy:
      title: Hydrogen tank assembly (H₂ injectant)
      detail: Gaseous **hydrogen** cylinder, stencil, tank-roof valve boss, and **H₂
        injectant trunk** to the magnet / NBI manifold. **Not** fusion-product helium
        ash (⁴He vents via ``Helium_Ash_Vent_Line`` into the nozzle).
      parts:
      - Tank_Hydrogen
      - Decal_H2
      - Pipe_H2_Feed
      - Hydrogen_Trunk_Line
    fluid_and_electrical_services:
      title: Auxiliary services (placeholder)
      detail: Fuel and cryo tank assemblies live under ``tank_assy`` (direct child of
        ``test_stand``). This node is reserved for future non-tank service bundles in the glTF tree.
      members: []
    hv_umbilical:
      title: High voltage umbilical
      parts:
      - High_Voltage_Umbilical
    fusion_hot_gas_outlet:
      title: Core exhaust / outlet plane
      detail: Working fluid and enthalpy exit from the fusion package toward the CD
        nozzle; represented as a thin outlet ring mesh at the anode exit plane.
        **⁴He ash** bleeds from this plane through ``Helium_Ash_Vent_Line`` into the
        nozzle plenum (see ``gas_flow.md``).
      parts:
      - Fusion_Hot_Gas_Outlet
      - Helium_Ash_Vent_Line
    fusion_reactor:
      title: Fusion reactor assembly
      detail: '**Scale note:** flight article is **many anode channels (~1000) in a
        hex-close cluster** under **one** common ``Magnet`` bore; this lab exports **one
        anode + one magnet** as a surrogate. p-¹¹B-class crossed-field electrostatic narrative:
        boron enters as B₂H₆ gas to the NBI/injector path (not solid boron); protons
        from hydrogenic inventory after dissociation. Primary headline channel ``¹H + ¹¹B → 3 ⁴He``.
        Wall power (Bremsstrahlung-scale in the design article) requires active anode
        thermal management—liquid CH₄ loop in the plant basis.'
      members:
      - fusion_hot_gas_outlet
      parts:
      - Anode
      - Cathode
      - Magnet
      - NBI_Injector
      - Insulators
      - DEC_Grid
    bd_annulus_path:
      title: Annulus flow path
      detail: Ring-shaped bypass / conditioning passage carrying compressor or bypass
        air around the core before it meets the detuner throat or re-enters the core
        periphery.
      parts:
      - BD_Annulus_Sleeve
    bd_shock_detuner_core:
      title: Shock detuner core
      detail: Shaped insert or multi-port cavity that softens or redirects shocks
        so downstream structures (magnet, grid, nozzle interface) see bounded gradients.
      parts:
      - BD_Shock_Detuner_Core
    bd_brackets_seals:
      title: Detuner structure, seals, and interfaces
      detail: Load path hardware, seals, and flanges that tie the detuner insert to
        the duct shell and to the nozzle / reactor hardpoints.
      parts:
      - BD_Bracket_Seals
    blast_detuner_assembly:
      title: Blast detuner module (annulus shell, core insert, flange hardware)
      detail: Coarse **lab-scale** bypass duct between magnet OD and nozzle plenum; insert
        **conditions shocks in the bypass stream** (not acoustic silencing). Fusion
        exhaust is a **separate** path through ``Fusion_Hot_Gas_Outlet``—see instance
        narratives.
      members:
      - bd_annulus_path
      - bd_shock_detuner_core
      - bd_brackets_seals
    reactor_inlet_jacket:
      title: Reactor bay inlet jacket (compressor → annulus)
      detail: Coarse **outer shell** in the axial gap between the compressor housing
        and the solenoid. **Design intent:** working air feeds the **annulus / jacket
        path** around the niobium pressure boundary, then continues toward the blast-detuner
        module—not through the plasma bore. The compressor **centre bore** to the anode
        face is **structural / sealing** in this mesh, not the main propulsive air path.
      parts:
      - Reactor_Bay_Inlet_Shroud
    reactor_duct_shielding:
      title: Reactor bay duct & shielding
      members:
      - blast_detuner_assembly
    turbofan_intake:
      title: Electric turbofan / inlet path
      detail: Bellmouth + compressor can sit **outside the anode on −X** (not buried
        in the bore) so the mesh reads **air in −X → fusion bay → hot gas +X → CD
        nozzle**.
      parts:
      - Bellmouth_Inlet
      - Compressor_Can
    nozzle_inlet_plenum:
      title: Nozzle inlet plenum / adapter
      detail: Turns the reactor outlet / bay flow into a uniform annulus or round
        feed for the CD contour; carries structural interface to the reactor shell.
      parts:
      - Nozzle_Inlet_Plenum
    nozzle_cd_contour:
      title: CD contour / throat region
      detail: Converging section, minimum-area throat, and start of divergent flaps—supersonic
        design intent in a coarse segmented mesh.
      parts:
      - Nozzle_CD_Contour
    nozzle_exit_hardware:
      title: Exit hardware & flange
      detail: Exit struts, flange to thrust frame, and instrumentation bosses at the
        nozzle tail.
      parts:
      - Nozzle_Exit_Hardware
    propulsive_nozzle:
      title: Propulsive nozzle assembly
      members:
      - nozzle_inlet_plenum
      - nozzle_cd_contour
      - nozzle_exit_hardware
    reactor_bay:
      title: Reactor bay (fusion core inside the engine flowpath)
      members:
      - fusion_reactor
      - reactor_inlet_jacket
      - reactor_duct_shielding
    air_breathing_engine:
      title: Air-breathing engine (reactor module embedded in the duct)
      members:
      - turbofan_intake
      - reactor_bay
      - propulsive_nozzle
instances:
  Thrust_Sled_Frame:
    narrative: 'Longitudinal rails, cross ties, and deck slab from arcjet_test_stand_cad;
      sits

      slightly dropped in Z so the deck top matches the bell pivot height used by
      the

      engine YAMLs.

      '
    template: thrust_sled_frame
    params:
      length: 2.2
      width: 1.0
      rail_h: 0.08
    color:
    - 0.35
    - 0.35
    - 0.38
    transform_chain:
    - op: translate
      xyz:
      - 0.0
      - 0.0
      - -0.12
  Rail_Left:
    narrative: 'Filleted beam spanning the pad along local X at +Y rail index; supports
      the sled

      rails narrative even though the mesh is only a stand-in block.

      '
    template: rail_beam
    params:
      span: 3.5
    color:
    - 0.35
    - 0.35
    - 0.38
    transform_chain:
    - op: translate
      xyz:
      - 0.0
      - 0.55
      - -0.1
  Rail_Right:
    narrative: 'Partner rail at −Y; keep parallel to Rail_Left so the sled can translate
      axially

      under thrust without yawing (conceptually—no wheel detail in this coarse mesh).

      '
    template: rail_beam
    params:
      span: 3.5
    color:
    - 0.35
    - 0.35
    - 0.38
    transform_chain:
    - op: translate
      xyz:
      - 0.0
      - -0.55
      - -0.1
  Tank_Hydrogen:
    narrative: 'Red H₂ cylinder at the fuel farm. **Role:** NBI co-injectant with diborane—stability
      / laminarity in the design narrative and hydrogenic inventory including the
      proton side of p-¹¹B after dissociation. Dotted logical links show flex jumpers
      toward the injectant trunk mesh.

      '
    template: lab_tank_hydrogen
    params: {}
    color:
    - 0.8
    - 0.1
    - 0.1
    transform_chain: []
  Tank_Diborane:
    narrative: 'Green B₂H₆ cylinder between hydrogen and cryo methane. **Role:** gaseous
      **boron carrier** to the NBI / injector train (not solid boron feed). In plasma,
      boron participates in the headline channel ``¹H + ¹¹B → 3 ⁴He`` after dissociation;
      natural boron is ~80% ¹¹B atom fraction unless procurement specifies enrichment.

      '
    template: lab_tank_diborane
    params: {}
    color:
    - 0.1
    - 0.6
    - 0.2
    transform_chain: []
  Tank_Farm_Platform:
    narrative: 'Steel skid under the +Y **fuel farm** row—thin deck (tank bases at z=0)
      and four corner posts sized to the same XY layout as ``Tank_Hydrogen``,
      ``Tank_Diborane``, and ``Tank_Cryo_Methane`` in ``LabInfrastructure.build_fuel_farm()``.

      '
    template: lab_tank_farm_platform
    params: {}
    color:
    - 0.33
    - 0.33
    - 0.36
    transform_chain: []
  Tank_Cryo_Methane:
    narrative: 'Larger dewar for **liquid CH₄**. **Role:** primary plant fluid for
      **anode / boundary thermal management** (Bremsstrahlung-scale wall heat in the
      design article)—not the boron carrier. Pairs with **Cryo_Methane_Piping** and the
      CH₄ decal under ``methane_tank_assy``; dewar-roof boss is ``Pipe_CH4_Feed``.

      '
    template: lab_tank_cryo_methane
    params: {}
    color:
    - 0.7
    - 0.7
    - 0.8
    transform_chain: []
  Decal_H2:
    narrative: 'Flat stencil text “HYDROGEN” on the tank—marking only, not a separate
      fluid.

      '
    template: lab_decal_h2
    params: {}
    color:
    - 0.9
    - 0.9
    - 0.9
    transform_chain: []
  Decal_B2H6:
    narrative: '“DIBORANE” stencil on the center tank.

      '
    template: lab_decal_b2h6
    params: {}
    color:
    - 0.9
    - 0.9
    - 0.9
    transform_chain: []
  Decal_CH4:
    narrative: 'Dark “LIQUID METHANE” stencil on the cryo dewar—marks the **thermal /
      cryogenic** CH₄ inventory (anode / plant cooling loop), not the boron carrier.

      '
    template: lab_decal_ch4
    params: {}
    color:
    - 0.1
    - 0.1
    - 0.1
    transform_chain: []
  High_Voltage_Umbilical:
    narrative: 'Schematic high-voltage umbilical from the operator console toward
      the reactor

      solenoid shell (reference lab art: orange service reaches the magnet crown,
      not a

      buried cathode tap). Real sequencing and interlocks stay in Nasal / XML; this

      mesh only shows a plausible bus run the operator can see.

      '
    template: lab_hv_umbilical
    params:
      include_port_markers: false
      connectivity_spec:
        physical_story: 'The console cluster energizes / supervises the core. The
          visible orange path is

          a coarse HV bus analogue; it must jog clear of the screen, stay visually

          distinct from fuel lines, and terminate on the magnet where a feedthrough
          would

          enter the yoke in a full design.

          '
        links:
        - link_id: hv_service
          service: high_voltage_schematic
          from_region: operator_console_cluster
          to_region: reactor_magnet_shell
          routing_intent: jog_clear_screen_then_climb_to_magnet_crown
      connector_ports:
      - id: console_hv_header
        anchor: console_hv_header
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: HV header beside the shifted console / screen cluster.
      - id: reactor_magnet_hv_feed
        anchor: reactor_magnet_hv_feed
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: Magnet shell crown after the fusion reactor instance pose in orbitron_lab.yaml
          (see LabInfrastructure.magnet_shell_connector_anchors).
      connector_links:
      - id: hv_service
        service: high_voltage_schematic
        from_port: console_hv_header
        to_port: reactor_magnet_hv_feed
        radius: 0.018
        description: Segmented jog from console cluster toward the solenoid crown feed.
        waypoints:
        - - -0.35
          - -3.15
          - 1.32
        - - 0.18
          - -1.05
          - 1.2
        - - 0.46
          - -0.12
          - 0.78
        - - 0.55
          - 0.0
          - 0.45
    color:
    - 0.9
    - 0.4
    - 0.0
    transform_chain: []
  Hydrogen_Trunk_Line:
    narrative: 'Dedicated **H₂ injectant** polyline from the hydrogen tank roof port to
      the magnet farm-face inlet (subset of the former combined ``Fuel_Gas_Lines`` mesh).
      Bundled under ``hydrogen_tank_assy``.

      '
    template: lab_h2_injectant_trunk
    params: {}
    color:
    - 0.2
    - 0.2
    - 0.2
    transform_chain: []
  Helium_Ash_Vent_Line:
    narrative: '**Fusion-product helium** (⁴He ash) vent from the core exhaust plane
      into the **nozzle inlet plenum** — parallel to the main hot-gas path, not from
      ``Tank_Hydrogen``. Routed along +X with the propulsive train.

      '
    template: lab_helium_ash_vent
    params: {}
    color:
    - 0.45
    - 0.72
    - 0.92
    transform_chain: []
  Boron_Trunk_Line:
    narrative: 'Dedicated **B₂H₆ injectant** polyline from the diborane tank roof to the
      magnet inlet (subset of the former combined ``Fuel_Gas_Lines`` mesh).

      '
    template: lab_b2h6_injectant_trunk
    params: {}
    color:
    - 0.2
    - 0.2
    - 0.2
