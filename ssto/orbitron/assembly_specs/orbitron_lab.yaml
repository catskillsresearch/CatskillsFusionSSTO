# Assembly D — full Orbitron fusion arcjet lab = includes A, B, C + propulsive tail (nozzle + detuner).
# Full build: make orbitron-lab-gltf   (writes …/build/orbitron_lab.gltf)

schema_version: 1

assembly:
  id: orbitron_lab
  title: Orbitron fusion arcjet laboratory (composed from sub-assemblies)
  narrative: |
    This is the “final integration” view: bring the deck and services (C), bolt the
    air path (A) and fusion spine (B) onto the same world frame, then add the segmented
    CD nozzle and blast-detuner hardware as the propulsive tail (D-only instances) so hot gas leaves
    along +X toward the detuner cans. The order of includes below is only for Outliner
    grouping—every leaf mesh is already placed in world coordinates, so you can still
    compile A, B, or C alone and see a coherent sub-assembly without double transforms.
    Use Blender’s right-hand tree to expand test_stand_and_services → …, then
    air_breathing_intake → …, then fusion_reactor_stack → …, and finally the segmented
    nozzle plus blast-detuner hardware on the +X tail.

includes:
  - file: test_stand_and_services.yaml
    node_name: test_stand_and_services
    narrative: |
      C — rails, sled, tanks, rigid lines, console, load cells. Lay the pad first in
      the real build; here it is just the first child assembly so you can isolate pad
      + farm geometry before looking at the duct.

  - file: air_breathing_intake.yaml
    node_name: air_breathing_intake
    narrative: |
      A — bellmouth + compressor can, sharing the deck pivot story with the YAML layout.

  - file: fusion_reactor_stack.yaml
    node_name: fusion_reactor_stack
    narrative: |
      B — electrodes, insulators, magnet, NBI; stacked and rotated with the same pivot
      as the bell so the crossed-field hardware reads as one horizontal spine.

instances:
  - id: Nozzle_Inlet_Plenum
    narrative: |
      Converging adapter / plenum stub immediately downstream of Fusion_Hot_Gas_Outlet;
      first axial segment of the propulsive_nozzle assembly.
    template: nozzle_inlet_plenum
    params: {}
    color: [0.2, 0.2, 0.22]
    transform_chain:
      - { op: translate, xyz: [0.0, 0.0, 2.75] }
      - { op: rotate_y_about_point, pivot: [0.0, 0.0, 0.15], angle_deg: 90.0 }

  - id: Nozzle_CD_Contour
    narrative: |
      Throat-forward CD segment between plenum adapter and divergent exit hardware.
    template: nozzle_cd_contour
    params: {}
    color: [0.22, 0.22, 0.24]
    transform_chain:
      - { op: translate, xyz: [0.0, 0.0, 2.82] }
      - { op: rotate_y_about_point, pivot: [0.0, 0.0, 0.15], angle_deg: 90.0 }

  - id: Nozzle_Exit_Hardware
    narrative: |
      Divergent nozzle tail / exit hardware chunk mated to the blast-detuner flange.
    template: nozzle_exit_hardware
    params: {}
    color: [0.18, 0.18, 0.2]
    transform_chain:
      - { op: translate, xyz: [0.0, 0.0, 2.87] }
      - { op: rotate_y_about_point, pivot: [0.0, 0.0, 0.15], angle_deg: 90.0 }

  - id: BD_Annulus_Sleeve
    narrative: |
      Annulus passage shell routing compressor / bypass air around the shock detuner core.
    template: bd_annulus_sleeve
    params: {}
    color: [0.35, 0.35, 0.38]
    transform_chain:
      - { op: translate, xyz: [0.0, 0.0, 2.95] }
      - { op: rotate_y_about_point, pivot: [0.0, 0.0, 0.15], angle_deg: 90.0 }

  - id: BD_Shock_Detuner_Core
    narrative: |
      Central insert volume that conditions shocks before flow reaches the bolting flange.
    template: bd_shock_core_insert
    params: {}
    color: [0.32, 0.32, 0.36]
    transform_chain:
      - { op: translate, xyz: [0.0, 0.0, 3.15] }
      - { op: rotate_y_about_point, pivot: [0.0, 0.0, 0.15], angle_deg: 90.0 }

  - id: BD_Bracket_Seals
    narrative: |
      Bolted flange + seal land tying the detuner module to the nozzle plenum / duct shell.
    template: bd_bracket_seal_flange
    params: {}
    color: [0.38, 0.38, 0.42]
    transform_chain:
      - { op: translate, xyz: [0.0, 0.0, 4.83] }
      - { op: rotate_y_about_point, pivot: [0.0, 0.0, 0.15], angle_deg: 90.0 }
