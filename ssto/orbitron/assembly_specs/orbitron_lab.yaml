schema_version: 2
assembly:
  id: orbitron_lab
  title: 'Orbitron fusion arcjet laboratory (single SSOT: geometry + logical tree)'
  narrative: 'Single YAML: CadQuery templates under ``instances``; Blender/FG hierarchy
    under ``logical.groups``. No separate logical file and no glTF nest pass—``cq.Assembly``
    mirrors ``logical.groups``.

    '
logical:
  root: test_stand
  scene_root_name: fusion_arcjet_engine
  glossary:
  - term: Annulus
    definition: 'A ring-shaped passage: fluid moves in the gap between two concentric
      surfaces (for example between an outer duct wall and an inner core or plug).
      It is used to route bypass air, condition shocks, or feed gas around a central
      module before it rejoins a core or nozzle.'
  - term: Blast / shock detuner
    definition: A short fluidic insert or multi-port cavity whose job is to tame abrupt
      pressure spikes (blasts or strong shocks) so upstream hardware sees gentler
      gradients. This lab mesh splits the coarse module into an annulus sleeve, a
      central insert, and a bolting / seal flange at the nozzle interface.
  - term: CD (convergent–divergent) nozzle
    definition: A supersonic nozzle with a converging section, a minimum-area throat,
      and a diverging section. The lab exports three coarse solids (inlet plenum adapter,
      throat-forward CD segment, divergent exit) that tile axially behind the reactor
      outlet ring.
  connections:
  - from: Tank_Hydrogen
    to: Pipe_H2_Feed
    label: tank fitting / flex jumper
    kind: dotted
  - from: Tank_Cryo_Methane
    to: Pipe_CH4_Feed
    label: CH4 service from cryo methane tank
    kind: dotted
  - from: Tank_Diborane
    to: Pipe_B2H6_Feed
    label: B2H6 blend / tracer line
    kind: dotted
  - from: Pipe_H2_Feed
    to: Fuel_Gas_Lines
    label: trunk carries blended routing to magnet inlets
    kind: dotted
  - from: Pipe_CH4_Feed
    to: Fuel_Gas_Lines
    label: trunk carries blended routing to magnet inlets
    kind: dotted
  - from: Pipe_B2H6_Feed
    to: Fuel_Gas_Lines
    label: trunk carries blended routing to magnet inlets
    kind: dotted
  - from: Pipe_H2_Feed
    to: DEC_Grid
    label: H2 toward grid / plenum region (schematic)
    kind: dotted
  - from: Pipe_CH4_Feed
    to: DEC_Grid
    label: CH4 toward grid (schematic)
    kind: dotted
  - from: Pipe_B2H6_Feed
    to: DEC_Grid
    label: B2H6 toward blend point (schematic)
    kind: dotted
  - from: Cryo_Methane_Piping
    to: Tank_Cryo_Methane
    label: cryostat / fill circuit (schematic)
    kind: dotted
  - from: Cryo_Methane_Piping
    to: Compressor_Can
    label: intercooling / heat rejection tie (concept)
    kind: dotted
  - from: High_Voltage_Umbilical
    to: Cathode
    label: HV feed toward cathode stack (schematic)
    kind: dotted
  - from: Bellmouth_Inlet
    to: Compressor_Can
    label: inlet → compressor
    kind: solid
  - from: Compressor_Can
    to: BD_Annulus_Sleeve
    label: compressed air into reactor bay / annulus
    kind: dotted
  - from: BD_Annulus_Sleeve
    to: BD_Shock_Detuner_Core
    label: annulus gas into detuner throat
    kind: solid
  - from: BD_Shock_Detuner_Core
    to: BD_Bracket_Seals
    label: pressure loads & seals
    kind: solid
  - from: BD_Annulus_Sleeve
    to: DEC_Grid
    label: conditioned flow couples core periphery
    kind: dotted
  - from: BD_Shock_Detuner_Core
    to: Magnet
    label: shock management near magnetic volume (concept)
    kind: dotted
  - from: Fusion_Hot_Gas_Outlet
    to: Nozzle_Inlet_Plenum
    label: core exhaust plane → nozzle inlet
    kind: solid
  - from: DEC_Grid
    to: Fusion_Hot_Gas_Outlet
    label: grid plenum toward outlet (schematic)
    kind: dotted
  - from: Nozzle_Inlet_Plenum
    to: Nozzle_CD_Contour
    label: inlet conditioning → CD contour
    kind: solid
  - from: Nozzle_CD_Contour
    to: Nozzle_Exit_Hardware
    label: contour → exit struts / flange
    kind: solid
  - from: Nozzle_Inlet_Plenum
    to: Fusion_Hot_Gas_Outlet
    label: axis / interface alignment
    kind: dotted
  - from: BD_Bracket_Seals
    to: Nozzle_Inlet_Plenum
    label: detuner flange mates nozzle plenum
    kind: dotted
  groups:
    test_stand:
      title: Orbitron test stand
      members:
      - control_panel_stand
      - supply_tanks
      - fluid_and_electrical_services
      - air_breathing_engine
    control_panel_stand:
      title: Control panel and stand
      parts:
      - Operator_Console
      - Rail_Left
      - Rail_Right
      - Thrust_Sled_Frame
      - Screen
      - Big_Red_Button
    supply_tanks:
      title: Supply tanks
      parts:
      - Tank_Cryo_Methane
      - Tank_Diborane
      - Tank_Hydrogen
    fluid_and_electrical_services:
      title: Cryo piping, fuel distribution, decals, HV umbilical
      members:
      - cryo_methane_services
      - fuel_gas_distribution
      - hv_umbilical
      - decal_cluster
    cryo_methane_services:
      title: Cryo methane / LH2-style services
      parts:
      - Cryo_Methane_Piping
    fuel_gas_distribution:
      title: Fuel gas distribution (tank valves + rigid trunk)
      members:
      - pipe_h2_feed
      - pipe_ch4_feed
      - pipe_b2h6_feed
      - fuel_gas_trunk
    fuel_gas_trunk:
      title: Rigid trunk to reactor magnet inlets
      parts:
      - Fuel_Gas_Lines
    pipe_h2_feed:
      title: H2 feed line assembly
      detail: H2-compatible tubing, filters, flex section, and fittings sized for
        hydrogen service; terminates in connectors toward the reactor manifold / grid
        region.
      parts:
      - Pipe_H2_Feed
    pipe_ch4_feed:
      title: CH4 feed line assembly
      detail: Cryogenic methane-rated line from the methane tank to the blend manifold;
        includes thermal breaks and service valves (concept).
      parts:
      - Pipe_CH4_Feed
    pipe_b2h6_feed:
      title: B2H6 / blend feed line assembly
      detail: Low-flow diborane or blend line with compatible seals and trace heating
        where needed; joins the CH4/H2 plumbing tree (concept).
      parts:
      - Pipe_B2H6_Feed
    hv_umbilical:
      title: High voltage umbilical
      parts:
      - High_Voltage_Umbilical
    decal_cluster:
      title: Tank decals (marking only)
      parts:
      - Decal_B2H6
      - Decal_CH4
      - Decal_H2
    fusion_hot_gas_outlet:
      title: Core exhaust / outlet plane
      detail: Working fluid and enthalpy exit from the fusion package toward the CD
        nozzle; represented as a thin outlet ring mesh at the anode exit plane.
      parts:
      - Fusion_Hot_Gas_Outlet
    fusion_reactor:
      title: Fusion reactor assembly
      members:
      - fusion_hot_gas_outlet
      parts:
      - Anode
      - Cathode
      - Magnet
      - NBI_Injector
      - Insulators
      - DEC_Grid
      - LoadCell_0
      - LoadCell_1
      - LoadCell_2
      - LoadCell_3
    bd_annulus_path:
      title: Annulus flow path
      detail: Ring-shaped bypass / conditioning passage carrying compressor or bypass
        air around the core before it meets the detuner throat or re-enters the core
        periphery.
      parts:
      - BD_Annulus_Sleeve
    bd_shock_detuner_core:
      title: Shock detuner core
      detail: Shaped insert or multi-port cavity that softens or redirects shocks
        so downstream structures (magnet, grid, nozzle interface) see bounded gradients.
      parts:
      - BD_Shock_Detuner_Core
    bd_brackets_seals:
      title: Detuner structure, seals, and interfaces
      detail: Load path hardware, seals, and flanges that tie the detuner insert to
        the duct shell and to the nozzle / reactor hardpoints.
      parts:
      - BD_Bracket_Seals
    blast_detuner_assembly:
      title: Blast detuner module (annulus shell, core insert, flange hardware)
      members:
      - bd_annulus_path
      - bd_shock_detuner_core
      - bd_brackets_seals
    reactor_duct_shielding:
      title: Reactor bay duct & shielding
      members:
      - blast_detuner_assembly
    turbofan_intake:
      title: Electric turbofan / inlet path
      parts:
      - Bellmouth_Inlet
      - Compressor_Can
    nozzle_inlet_plenum:
      title: Nozzle inlet plenum / adapter
      detail: Turns the reactor outlet / bay flow into a uniform annulus or round
        feed for the CD contour; carries structural interface to the reactor shell.
      parts:
      - Nozzle_Inlet_Plenum
    nozzle_cd_contour:
      title: CD contour / throat region
      detail: Converging section, minimum-area throat, and start of divergent flaps—supersonic
        design intent in a coarse segmented mesh.
      parts:
      - Nozzle_CD_Contour
    nozzle_exit_hardware:
      title: Exit hardware & flange
      detail: Exit struts, flange to thrust frame, and instrumentation bosses at the
        nozzle tail.
      parts:
      - Nozzle_Exit_Hardware
    propulsive_nozzle:
      title: Propulsive nozzle assembly
      members:
      - nozzle_inlet_plenum
      - nozzle_cd_contour
      - nozzle_exit_hardware
    reactor_bay:
      title: Reactor bay (fusion core inside the engine flowpath)
      members:
      - fusion_reactor
      - reactor_duct_shielding
    air_breathing_engine:
      title: Air-breathing engine (reactor module embedded in the duct)
      members:
      - turbofan_intake
      - reactor_bay
      - propulsive_nozzle
instances:
  Thrust_Sled_Frame:
    narrative: 'Longitudinal rails, cross ties, and deck slab from arcjet_test_stand_cad;
      sits

      slightly dropped in Z so the deck top matches the bell pivot height used by
      the

      engine YAMLs.

      '
    template: thrust_sled_frame
    params:
      length: 2.2
      width: 1.0
      rail_h: 0.08
    color:
    - 0.35
    - 0.35
    - 0.38
    transform_chain:
    - op: translate
      xyz:
      - 0.0
      - 0.0
      - -0.12
  Rail_Left:
    narrative: 'Filleted beam spanning the pad along local X at +Y rail index; supports
      the sled

      rails narrative even though the mesh is only a stand-in block.

      '
    template: rail_beam
    params:
      span: 3.5
    color:
    - 0.35
    - 0.35
    - 0.38
    transform_chain:
    - op: translate
      xyz:
      - 0.0
      - 0.55
      - -0.1
  Rail_Right:
    narrative: 'Partner rail at −Y; keep parallel to Rail_Left so the sled can translate
      axially

      under thrust without yawing (conceptually—no wheel detail in this coarse mesh).

      '
    template: rail_beam
    params:
      span: 3.5
    color:
    - 0.35
    - 0.35
    - 0.38
    transform_chain:
    - op: translate
      xyz:
      - 0.0
      - -0.55
      - -0.1
  Tank_Hydrogen:
    narrative: 'Red H2 cylinder at the fuel farm; dotted-line connections in the logical
      JSON

      describe flex jumpers toward the shared fuel-gas mesh.

      '
    template: lab_tank_hydrogen
    params: {}
    color:
    - 0.8
    - 0.1
    - 0.1
    transform_chain: []
  Tank_Diborane:
    narrative: 'Green B2H6 / tracer tank between hydrogen and cryo methane in the
      farm layout.

      '
    template: lab_tank_diborane
    params: {}
    color:
    - 0.1
    - 0.6
    - 0.2
    transform_chain: []
  Tank_Cryo_Methane:
    narrative: 'Larger dewar for cryo methane; pairs with cryostat piping mesh and
      the CH4 text

      decal on the side.

      '
    template: lab_tank_cryo_methane
    params: {}
    color:
    - 0.7
    - 0.7
    - 0.8
    transform_chain: []
  Decal_H2:
    narrative: 'Flat stencil text “HYDROGEN” on the tank—marking only, not a separate
      fluid.

      '
    template: lab_decal_h2
    params: {}
    color:
    - 0.9
    - 0.9
    - 0.9
    transform_chain: []
  Decal_B2H6:
    narrative: '“DIBORANE” stencil on the center tank.

      '
    template: lab_decal_b2h6
    params: {}
    color:
    - 0.9
    - 0.9
    - 0.9
    transform_chain: []
  Decal_CH4:
    narrative: 'Dark “LIQUID METHANE” stencil on the cryo dewar for contrast.

      '
    template: lab_decal_ch4
    params: {}
    color:
    - 0.1
    - 0.1
    - 0.1
    transform_chain: []
  High_Voltage_Umbilical:
    narrative: 'Schematic high-voltage umbilical from the operator console toward
      the reactor

      solenoid shell (reference lab art: orange service reaches the magnet crown,
      not a

      buried cathode tap). Real sequencing and interlocks stay in Nasal / XML; this

      mesh only shows a plausible bus run the operator can see.

      '
    template: lab_hv_umbilical
    params:
      include_port_markers: false
      connectivity_spec:
        physical_story: 'The console cluster energizes / supervises the core. The
          visible orange path is

          a coarse HV bus analogue; it must jog clear of the screen, stay visually

          distinct from fuel lines, and terminate on the magnet where a feedthrough
          would

          enter the yoke in a full design.

          '
        links:
        - link_id: hv_service
          service: high_voltage_schematic
          from_region: operator_console_cluster
          to_region: reactor_magnet_shell
          routing_intent: jog_clear_screen_then_climb_to_magnet_crown
      connector_ports:
      - id: console_hv_header
        anchor: console_hv_header
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: HV header beside the shifted console / screen cluster.
      - id: reactor_magnet_hv_feed
        anchor: reactor_magnet_hv_feed
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: Magnet shell crown after the fusion reactor instance pose in orbitron_lab.yaml
          (see LabInfrastructure.magnet_shell_connector_anchors).
      connector_links:
      - id: hv_service
        service: high_voltage_schematic
        from_port: console_hv_header
        to_port: reactor_magnet_hv_feed
        radius: 0.018
        description: Segmented jog clear of the screen, then climb to the solenoid
          top centre.
        waypoints:
        - - -0.55
          - -1.45
          - 1.42
        - - 0.1
          - -0.5
          - 0.78
        - - 0.52
          - -0.05
          - 0.48
    color:
    - 0.9
    - 0.4
    - 0.0
    transform_chain: []
  Fuel_Gas_Lines:
    narrative: 'Three process-gas polylines from the farm tank tops to **separate**
      inlets on the

      magnet’s +Y (farm-facing) shell—matching the mental model “tanks behind the
      rig,

      lines sweep forward, meet the black solenoid from the back,” not three tubes
      into

      one DEC point. Anchor keys resolve in ``LabInfrastructure.fuel_line_connector_anchors()``;

      ``connectivity_spec`` documents service roles for humans and for compiler validation.

      '
    template: lab_fuel_gas_lines
    params:
      include_port_markers: false
      connectivity_spec:
        physical_story: 'H₂ is the primary working gas, B₂H₆ is the tracer / minority
          blend leg, and CH₄

          is the cryo methane leg that also pairs with the light cryostat pipe. Each
          leg

          should stay visually separated on the reactor shell so the mesh reads as
          three

          commissioning circuits, not a bundle jammed into the grid.

          '
        links:
        - link_id: h2_service
          service: process_h2
          from_region: fuel_farm_h2_tank
          to_region: reactor_magnet_shell_farm_face
          routing_intent: arc_over_deck_then_h2_side_inlet
        - link_id: b2h6_service
          service: diborane_tracer
          from_region: fuel_farm_b2h6_tank
          to_region: reactor_magnet_shell_farm_face
          routing_intent: arc_over_deck_then_centre_inlet
        - link_id: ch4_service
          service: cryo_methane_process
          from_region: fuel_farm_ch4_dewar
          to_region: reactor_magnet_shell_farm_face
          routing_intent: arc_over_deck_then_ch4_side_inlet
      connector_ports:
      - id: tank_h2_out
        anchor: fuel_farm_h2_tank_top
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: H2 cylinder top centre (matches CadQuery fuel farm).
      - id: reactor_h2_in
        anchor: reactor_fuel_h2_in
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: Magnet +Y shell inlet on the H₂-ward side of the solenoid (spread
          in +X).
      - id: tank_b2h6_out
        anchor: fuel_farm_b2h6_tank_top
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: Diborane cylinder top centre.
      - id: reactor_b2h6_in
        anchor: reactor_fuel_b2h6_in
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: Magnet +Y shell inlet near tube centreline for the tracer leg.
      - id: tank_ch4_out
        anchor: fuel_farm_ch4_dewar_top
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: Cryo methane dewar top centre (shorter dewar than H2/B2).
      - id: reactor_ch4_in
        anchor: reactor_fuel_ch4_in
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: Magnet +Y shell inlet on the −X side toward the CH₄ dewar.
      connector_links:
      - id: h2_service
        service: process_h2
        from_port: tank_h2_out
        to_port: reactor_h2_in
        radius: 0.02
        description: Hydrogen — polyline clears the deck edge then meets the magnet
          back face.
        waypoints:
        - - 0.62
          - 0.82
          - 0.98
        - - 0.76
          - 0.36
          - 0.38
      - id: b2h6_service
        service: diborane_tracer
        from_port: tank_b2h6_out
        to_port: reactor_b2h6_in
        radius: 0.02
        description: Diborane / blend line with a mid run biased toward tube centreline.
        waypoints:
        - - 0.04
          - 0.82
          - 0.96
        - - 0.38
          - 0.36
          - 0.32
      - id: ch4_service
        service: cryo_methane_process
        from_port: tank_ch4_out
        to_port: reactor_ch4_in
        radius: 0.028
        description: Cryogenic methane line from the dewar toward the −X magnet inlet.
        waypoints:
        - - -0.52
          - 0.88
          - 0.82
        - - 0.02
          - 0.42
          - 0.34
    color:
    - 0.2
    - 0.2
    - 0.2
    transform_chain: []
  Cryo_Methane_Piping:
    narrative: 'Separate light-grey **cryostat** leg for liquid methane (distinct
      from the black

      process-gas CH₄ run): dewar roof to a high-side tap on the magnet shell, matching

      reference lab art where the grey line climbs and meets the solenoid near the
      top

      / inboard face. Compressor plumbing for the air path remains under logical group ``air_breathing_engine``.

      '
    template: lab_cryo_methane_piping
    params:
      include_port_markers: false
      connectivity_spec:
        physical_story: 'The dewar stores CH₄ for both process and cryostat narratives;
          this mesh is the

          “cryo fill / vent” analogue that visually ties the dewar to the core without

          pretending to be the turbofan methane duct.

          '
        links:
        - link_id: cryo_fill
          service: cryo_ch4_cryostat_fill
          from_region: fuel_farm_ch4_dewar
          to_region: reactor_magnet_shell_high_tap
          routing_intent: rise_then_bridge_deck_to_magnet_rim
      connector_ports:
      - id: cryo_ch4_dewar_out
        anchor: cryo_ch4_dewar_out
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: Dewar roof / cryostat breakout (same world point as fuel farm
          CH₄ top).
      - id: reactor_magnet_cryo_ch4_tap
        anchor: reactor_magnet_cryo_ch4_tap
        offset:
        - 0.0
        - 0.0
        - 0.0
        description: Magnet crown / inboard rim tap (see LabInfrastructure.magnet_shell_connector_anchors).
      connector_links:
      - id: cryo_fill
        service: cryo_ch4_cryostat_fill
        from_port: cryo_ch4_dewar_out
        to_port: reactor_magnet_cryo_ch4_tap
        radius: 0.022
        description: Rise from dewar, jog inboard, terminate high on the solenoid
          shell.
        waypoints:
        - - -0.48
          - 0.9
          - 0.9
        - - -0.08
          - 0.38
          - 0.55
        - - 0.04
          - 0.06
          - 0.4
    color:
    - 0.8
    - 0.8
    - 0.85
    transform_chain: []
  Operator_Console:
    narrative: 'Desk + tilted panel + battery block; shifted by CONSOLE_OFFSET_M in
      the parent

      lab narrative so the operator stands clear of the plume line. Behavioural spec

      (interlocks, DEC sequence, telemetry): orbitron_operator_console_spec.yaml.

      '
    template: lab_operator_console_desk
    params: {}
    color:
    - 0.15
    - 0.15
    - 0.15
    transform_chain:
    - op: translate
      xyz:
      - -1.4
      - -2.3
      - 0.0
  Screen:
    narrative: 'Flat display solid in front of the tilted panel; same offset as the
      desk so it

      rides with the console cluster.

      '
    template: lab_operator_screen
    params: {}
    color:
