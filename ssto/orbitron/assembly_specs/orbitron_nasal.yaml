# Declarative spec for Nasal loaded by FlightGear (generated under Aircraft/<package_dir>/Nasal/).
# Consumed by: tools/compile_orbitron_nasal.py
# Do not edit .nas by hand; change this file and run make.

schema_version: 1
spec_kind: orbitron_nasal
title: Orbitron test stand — generated Nasal

# Thrust / load telemetry: documented in assembly_specs/README.md and repo README.md.
# Compute in JSBSim; this file only maps properties → Screen text (reactor_ui.telemetry).

telemetry:
  title: Thrust and thrust-sled load measurement (operator Screen)
  compute:
    engine: JSBSim
    template: tools/templates/orbitron-jsbsim.xml
    system: arcjet_airbreather
    physics_coeffs: orbitron_physics_surrogate.yaml → thrust_sled_load_cells
    fg_coeffs_path: /sim/model/orbitron/thrust-sled/
  controls:
    - { keys: "1", prop: /sim/model/orbitron/pad-apu-online, role: pad APU cart online }
    - { keys: "2", prop: /sim/model/orbitron/starter-engage, role: starter motor engage (requires APU) }
    - { keys: "3", prop: /sim/model/orbitron/bleed-air-open, role: bleed / intake path open }
    - { keys: "SPACE", prop: /sim/model/reactor/startup-trigger, role: reactor ignite (requires bleed) }
    - { keys: "W / S", prop: /controls/reactor/throttle, role: ion beam command → mA, thrust, mdot, ±Y load split }
    - { keys: "I / K", prop: /controls/orbitron/cathode-pulse, role: cathode pulse / shear (PSP2–Jin) → stability proxy }
    - { keys: "U / J", prop: /controls/orbitron/compressor, role: compressor command (effective with bleed + spool) }
  jsbsim_properties:
    - { name: thrust-lbf, label: "Thrust", unit: lbf }
    - { name: thrust-kn, label: "Thrust", unit: kN }
    - { name: equiv-exhaust-velocity-mps, label: "Equiv. exhaust speed (F/ṁ)", unit: m/s }
    - { name: jet-kinetic-power-mw, label: "Jet kinetic (½ṁv_e²)", unit: MW }
    - { name: mass-flow-kgps, label: "Airflow (mdot)", unit: kg/s }
    - { name: sled-load-total-lbf, label: "Sled Load Total", unit: lbf }
    - { name: load-cell-0-lbf, label: "LC +X+Y", unit: lbf, corner: "+X+Y" }
    - { name: load-cell-1-lbf, label: "LC -X+Y", unit: lbf, corner: "-X+Y" }
    - { name: load-cell-2-lbf, label: "LC +X-Y", unit: lbf, corner: "+X-Y" }
    - { name: load-cell-3-lbf, label: "LC -X-Y", unit: lbf, corner: "-X-Y" }
  display:
    surface: Screen mesh (control_panel_stand)
    nasal_module: reactor_ui.nas
    refresh_hz: 10

surrogate_load:
  header: |
    Bilinear surrogate coefficients baked at compile time from engine_surrogate.json
    into /sim/model/orbitron/surrogate/* (no runtime parsejson). Generated from orbitron_nasal.yaml.
  fg_surrogate_root: /sim/model/orbitron/surrogate
  init_delay_sec: 0
  surfaces:
    - fg_prefix: thrust
      json_bilinear: thrust_lbf_surface
      json_linear_fallback: thrust_lbf_vs_throttle
    - fg_prefix: mdot
      json_bilinear: mass_flow_kgps_surface
      json_linear_fallback: mass_flow_kgps_vs_throttle
    - fg_prefix: power
      json_bilinear: gross_power_mw_surface
    - fg_prefix: heat
      json_bilinear: heat_kw_surface
  beam_screen_optional:
    json_bilinear: beam_screen_kw_surface
    fg_prefix: beam-screen-kw

orbitron_ops:
  header: |
    Pad startup interlocks + starter crank pulse (orbitron_operator_console_spec.yaml).
    Generated — edit orbitron_nasal.yaml orbitron_ops block.
  # JSBSim reports 0 engines — FG often spawns at null island and the pad tumbles (view spins).
  startup_reposition:
    # BIKF East-Apron-119 (groundnet N63 58.912 W22 35.304). Lat/lon only — parkpos breaks 0-engine JSBSim.
    latitude_deg: 63.98187
    longitude_deg: -22.5884
    altitude_ft: 158
    pad_clearance_ft: 1.5
    heading_deg: 0
    pad_tolerance_deg: 0.02
    place_retry_sec: 0.35
    place_retry_max: 8
  pad_stabilize:
    roll_deg: 0
    pitch_deg: 0
    hz: 30
  operator_view:
    eye: [-1.4, -4.8, 1.65]
    target: [-1.4, -2.3, 1.25]
  startup_view_number: 2
  block_hijack_views: true
  timer_hz: 10
  crank_prop: /sim/model/reactor/startup-starter-crank
  crank_reset_sec: 0.18
  props:
    pad_apu: /sim/model/orbitron/pad-apu-online
    starter: /sim/model/orbitron/starter-engage
    bleed: /sim/model/orbitron/bleed-air-open
    ignite: /sim/model/reactor/startup-trigger

reactor_ui:
  class_name: ReactorUI
  canvas:
    name: Reactor_Telemetry
    size: [1024, 2000]
    view: [1024, 2000]
    mipmapping: 1
  colors:
    outer_fill: [0.06, 0.08, 0.12, 1.0]
    inner_fill: [0.0, 0.0, 0.0, 1.0]
    hud_text: [0, 1, 0]
    title: [1, 0.8, 0]
  fonts:
    title: { path: LiberationFonts/LiberationSans-Bold.ttf, size: 56 }
    hud: { path: LiberationFonts/LiberationMono-Bold.ttf, size: 44 }
    debug: { path: LiberationFonts/LiberationMono-Bold.ttf, size: 20 }
  title:
    text: ORBITRON + ARCJET TEST STAND
    position: [512, 100]
  use_screen_placement: false
  startup_open_debug_dialog: false
  canvas_placement:
    node: Screen
    retry_hz: 4
    max_attempts: 60
    open_debug_window_on_fail: false
  timer_hz: 10
  main_rows:
    - id: seq_hint
      y: 130
      kind: static
      text: "SEQ: 1 APU  2 START  3 BLEED  SPACE IGNITE  W/S U/J"
    - id: apu
      y: 200
      kind: bool_word
      prefix: "Pad APU: "
      prop: /sim/model/orbitron/pad-apu-online
      true_word: "ON"
      false_word: "OFF"
    - id: starter
      y: 275
      kind: bool_word
      prefix: "Starter: "
      prop: /sim/model/orbitron/starter-engage
      true_word: "ENGAGE"
      false_word: "OFF"
    - id: bleed
      y: 350
      kind: bool_word
      prefix: "Bleed air: "
      prop: /sim/model/orbitron/bleed-air-open
      true_word: "OPEN"
      false_word: "CLOSED"
    - id: state
      y: 425
      kind: bool_word
      prefix: "Reactor ignite: "
      prop: /sim/model/reactor/startup-trigger
      true_word: "ARMED"
      false_word: "SAFE"
    - id: beam_ma
      y: 515
      kind: float
      prop: /fdm/jsbsim/systems/reactor/beam-current-ma
      sprintf: "Ion beam: %.2f mA"
    - id: cathode_kv
      y: 590
      kind: float
      prop: /fdm/jsbsim/systems/reactor/cathode-voltage-kv
      sprintf: "Cathode: %.0f kV"
    - id: cathode_pulse
      y: 665
      kind: float
      prop: /controls/orbitron/cathode-pulse
      sprintf: "Cathode pulse: %.2f"
    - id: plasma_n
      y: 740
      kind: float
      prop: /fdm/jsbsim/systems/reactor/plasma-density-log10
      sprintf: "log10 n: %.2f cm^-3"
    - id: comp
      y: 600
      kind: float
      prop: /controls/orbitron/compressor
      sprintf: "Compressor: %.2f"
    - id: power
      y: 690
      kind: float
      prop: /fdm/jsbsim/systems/reactor/gross-power-mw
      sprintf: "Gross Power: %.3f MW"
      hud_placeholder: "Gross Power: 0.00 MW"
    - id: amps
      y: 780
      kind: float
      prop: /fdm/jsbsim/systems/reactor/current-amps
      sprintf: "DEC Current: %.3f A"
    - id: decv
      y: 870
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/dec-voltage-mv
      sprintf: "DEC Bias: %.1f MV"
    - id: heat
      y: 960
      kind: float
      prop: /fdm/jsbsim/systems/reactor/heat-kw
      sprintf: "Brem. Heat: %.1f kW"
      hud_placeholder: "Brem. Heat: 0.00 kW"
    - id: q
      y: 1050
      kind: float
      prop: /fdm/jsbsim/systems/reactor/q-factor
      sprintf: "Q-Factor: %.2f"
    - id: thrust
      y: 1140
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/thrust-lbf
      sprintf: "Thrust: %.0f lbf"
    - id: thrust_kn
      y: 1215
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/thrust-kn
      sprintf: "Thrust: %.2f kN"
    - id: jet_ve
      y: 1290
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/equiv-exhaust-velocity-mps
      sprintf: "Jet v_e (F/ṁ): %.1f m/s"
    - id: jet_p_mw
      y: 1365
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/jet-kinetic-power-mw
      sprintf: "Jet kinetic: %.3f MW"
    - id: mdot
      y: 1440
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/mass-flow-kgps
      sprintf: "Airflow (mdot): %.3f kg/s"
    - id: sled_load
      y: 1515
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/sled-load-total-lbf
      sprintf: "Sled Load Total: %.0f lbf"
    - id: lc0
      y: 1590
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/load-cell-0-lbf
      sprintf: "LC +X+Y: %.0f lbf"
    - id: lc1
      y: 1665
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/load-cell-1-lbf
      sprintf: "LC -X+Y: %.0f lbf"
    - id: lc2
      y: 1740
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/load-cell-2-lbf
      sprintf: "LC +X-Y: %.0f lbf"
    - id: lc3
      y: 1815
      kind: float
      prop: /fdm/jsbsim/systems/arcjet/load-cell-3-lbf
      sprintf: "LC -X-Y: %.0f lbf"
    - id: beam
      y: 1890
      kind: sprintf2
      fmt: "Viewport beam: %.1f kW  |  %.2f mA"
      props:
        - /fdm/jsbsim/systems/reactor/beam-screen-deposition-kw
        - /fdm/jsbsim/systems/reactor/beam-current-ma
  debug_window:
    title: Arcjet / Reactor Telemetry
    size: [520, 780]
    background: [0.03, 0.03, 0.03, 0.90]
    line_start_y: 28
    line_step: 38
    label_x: 16
    rows:
      - label_static: "Startup Trigger: OFF"
