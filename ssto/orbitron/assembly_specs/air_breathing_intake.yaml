# Assembly A — electric turbofan / inlet path (bellmouth + compressor can).
# Compile alone: poetry run python tools/compile_assembly_yaml.py --spec ssto/orbitron/assembly_specs/air_breathing_intake.yaml --out /tmp/A_intake.gltf

schema_version: 1

assembly:
  id: air_breathing_intake
  title: Air-breathing intake path (bellmouth → compressor)
  narrative: |
    Lay the runway-side of the engine first: a bellmouth flare picks up ambient air and
    feeds a short compressor can. In the lab layout the whole duct stack is then swung
    horizontal about the deck pivot so the flow axis becomes +X (intake toward −X).
    This YAML only carries the inlet pair; the fusion core and nozzle live in sibling
    specs so you can open just this file in Blender and verify the flare and can mate
    sensibly before the reactor is stacked behind them.

includes: []

instances:
  - id: Bellmouth_Inlet
    narrative: |
      Coarse axisymmetric bellmouth: big mouth toward −X, throat toward the compressor.
      Sits with its foot on the deck reference height, then the whole vertical stack is
      rotated +90° about deck Y through that foot so the bell lies along +X like a
      ground-test ram path rather than a vertical tabletop toy.
    template: bellmouth_flare
    params:
      inlet_r: 0.18
      throat_r: 0.05
      length: 0.35
    color: [0.55, 0.58, 0.62]
    transform_chain:
      - { op: translate, xyz: [0.0, 0.0, 0.15] }
      - { op: rotate_y_about_point, pivot: [0.0, 0.0, 0.15], angle_deg: 90.0 }

  - id: Compressor_Can
    narrative: |
      Simple motor/compressor housing shell around the duct, stacked above the bell
      along the pre-rotation +Z axis, then rotated with the same deck pivot so it
      lands on-axis behind the bellmouth along +X.
    template: compressor_housing
    params:
      od: 0.14
      length: 0.25
    color: [0.55, 0.58, 0.62]
    transform_chain:
      - { op: translate, xyz: [0.0, 0.0, 0.5] }
      - { op: rotate_y_about_point, pivot: [0.0, 0.0, 0.15], angle_deg: 90.0 }
