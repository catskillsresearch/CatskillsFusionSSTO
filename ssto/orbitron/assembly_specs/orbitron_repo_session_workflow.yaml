# How to run Cursor-assisted sessions on this repo (Plan vs Agent, checkpoints).
# Not consumed by assembly or sound compilers — human / agent process only.
# Migrated from ssto/orbitron/CURSOR_GOAL_LOOP.txt.

schema_version: 1
spec_kind: orbitron_repo_session_workflow
title: Cursor goal list, human-in-the-loop, and planning mode

section_a_plan_mode: |
  In Cursor, switch the chat mode to Plan (mode picker next to the input,
  alongside Agent / Ask) when you want the model to design and sequence work
  with minimal or no repo edits: tradeoffs, file touch list, acceptance tests,
  and checkpoints. Agent mode is for applying edits and running commands.
  Flow: Plan to lock scope → you approve → Agent executes a slice → you
  verify → repeat.

section_b_knockout_pattern: |
  1. Paste the numbered goals as the single source of truth for the session.
  2. Ask for one checkpoint artifact per goal (review doc, script, XML diff,
     screenshot checklist) so "done" is objective.
  3. After each goal: you run FG/JSBSim or WarpX once; if pass, say
     "checkpoint N OK" so the next goal does not inherit hidden debt.
  4. Keep goals in one branch or one PR series; avoid mixing unrelated refactors.

section_c_goal_artifact_map: |
  1 → assembly_specs/orbitron_physics_surrogate.yaml
      (formal: laminar_flow_2d_py_case_review, design_brief_gaps_fusion_arcjet,
      postprocessing_animate_plasma_note).
  2 → ssto/orbitron/laminar_flow_2d_arcjet.py
  3 → assembly_specs/orbitron_operator_console_spec.yaml
  4 → arcjet_test_stand_cad.py + tools/templates/orbitron-jsbsim.xml +
      assembly_specs/orbitron_aircraft_flightgear.yaml (→ Aircraft/… set.xml, Orbitron.xml, jsbsim copy) +
      assembly_specs/orbitron_nasal.yaml (→ Aircraft/…/Nasal/*.nas via compile_orbitron_nasal.py)
  5 → tools/warpx_to_jsbsim_surrogate.py + Aircraft/<pkg>/engine_surrogate.json (generated)

section_d_surrogate_to_runtime: |
  Defaults in *-set.xml under /sim/model/orbitron/surrogate/*.
  engine_surrogate.json (same folder as -set.xml) loaded by Nasal/surrogate_load.nas (generated from orbitron_nasal.yaml).
  orbitron-jsbsim.xml thrust and mass-flow read those props (linear in throttle,
  scaled by active * compressor). Tool flag: --print-set-xml.
