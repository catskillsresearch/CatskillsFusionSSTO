    detail: Turns the reactor outlet / bay flow into a uniform annulus or round feed for the CD contour;
      carries structural interface to the reactor shell.
    parts:
    - Nozzle_Inlet_Plenum
  nozzle_cd_contour:
    title: CD contour / throat region
    detail: Converging section, minimum-area throat, and start of divergent flaps—supersonic design intent
      in a coarse segmented mesh.
    parts:
    - Nozzle_CD_Contour
  nozzle_exit_hardware:
