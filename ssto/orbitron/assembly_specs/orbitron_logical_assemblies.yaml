# Logical assembly tree + glossary + schematic connections for nested lab glTF and Mermaid.
# Consumed by tools/gltf_nest_from_assemblies.py and tools/orbitron_ac_hierarchy_mmd.py (via
# tools/orbitron_logical_assemblies_spec.py).
# Every group below either lists ``parts`` / ``mesh_parts`` or ``members`` that resolve to meshes;
# connection endpoints are glTF / AC mesh object names.

root: test_stand
glossary:
- term: Annulus
  definition: 'A ring-shaped passage: fluid moves in the gap between two concentric surfaces (for example
    between an outer duct wall and an inner core or plug). It is used to route bypass air, condition shocks,
    or feed gas around a central module before it rejoins a core or nozzle.'
- term: Blast / shock detuner
  definition: 'A short fluidic insert or multi-port cavity whose job is to tame abrupt pressure spikes
    (blasts or strong shocks) so upstream hardware sees gentler gradients. This lab mesh splits the coarse
    module into an annulus sleeve, a central insert, and a bolting / seal flange at the nozzle interface.'
- term: CD (convergent–divergent) nozzle
  definition: A supersonic nozzle with a converging section, a minimum-area throat, and a diverging section.
    The lab exports three coarse solids (inlet plenum adapter, throat-forward CD segment, divergent exit)
    that tile axially behind the reactor outlet ring.
