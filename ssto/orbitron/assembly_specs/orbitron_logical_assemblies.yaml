  pipe_h2_feed:
    title: H2 feed line assembly
    detail: H2-compatible tubing, filters, flex section, and fittings sized for hydrogen service; terminates
      in connectors toward the reactor manifold / grid region.
    parts:
    - Pipe_H2_Feed
  pipe_ch4_feed:
    title: CH4 feed line assembly
    detail: Cryogenic methane-rated line from the methane tank to the blend manifold; includes thermal
      breaks and service valves (concept).
    parts:
    - Pipe_CH4_Feed
  pipe_b2h6_feed:
    title: B2H6 / blend feed line assembly
    detail: Low-flow diborane or blend line with compatible seals and trace heating where needed; joins
      the CH4/H2 plumbing tree (concept).
    parts:
    - Pipe_B2H6_Feed
