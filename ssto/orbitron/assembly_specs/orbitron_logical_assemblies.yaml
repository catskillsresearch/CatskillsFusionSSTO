    detail: Ring-shaped bypass / conditioning passage carrying compressor or bypass air around the core
      before it meets the detuner throat or re-enters the core periphery.
    parts:
    - BD_Annulus_Sleeve
  bd_shock_detuner_core:
    title: Shock detuner core
    detail: Shaped insert or multi-port cavity that softens or redirects shocks so downstream structures
      (magnet, grid, nozzle interface) see bounded gradients.
    parts:
    - BD_Shock_Detuner_Core
  bd_brackets_seals:
    title: Detuner structure, seals, and interfaces
    detail: Load path hardware, seals, and flanges that tie the detuner insert to the duct shell and to
      the nozzle / reactor hardpoints.
    parts:
    - BD_Bracket_Seals
  blast_detuner_assembly:
    title: Blast detuner module (annulus shell, core insert, flange hardware)
    members:
    - bd_annulus_path
    - bd_shock_detuner_core
    - bd_brackets_seals
  reactor_duct_shielding:
